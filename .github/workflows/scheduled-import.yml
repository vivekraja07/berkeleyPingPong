name: Scheduled Tournament Import

on:
  schedule:
    # GitHub Actions cron is UTC-only. This is Saturday 09:00 UTC = 1:00 AM Pacific Standard Time
    # (PST). During PDT the same UTC instant is 2:00 AM local—unavoidable with a fixed UTC rule.
    # Saturday catches typical Friday-night results after they are posted.
    # Cron: minute hour day month day-of-week (6 = Saturday)
    - cron: '0 9 * * 6'
  workflow_dispatch:  # Allow manual triggering

jobs:
  import-tournaments:
    # Secrets can live on this Environment (Settings → Environments → supabase) or as
    # repository secrets. If this env has "Required reviewers", scheduled runs will wait
    # for approval — remove that rule for this env or use repository secrets instead.
    environment: supabase
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run scheduled import
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          # .env is not in git; values come from the "supabase" environment and/or repo secrets.
          if [ -z "${SUPABASE_URL}" ] || [ -z "${SUPABASE_KEY}" ]; then
            echo "::error::Missing SUPABASE_URL and/or SUPABASE_KEY. Add them to the supabase environment or repository Actions secrets, then re-run."
            exit 1
          fi
          python3 scripts/scheduled_import.py
      
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Scheduled Tournament Import Failed',
                body: 'The scheduled tournament import job failed. Please check the workflow logs for details.\n\n' +
                      `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                labels: ['bug', 'automation']
              });
              console.log('Issue created successfully');
            } catch (error) {
              console.error('Failed to create issue:', error.message);
              // Don't fail the step if issue creation fails
            }

